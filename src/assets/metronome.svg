<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 28">
  <!-- Base foot -->
  <rect x="0" y="25" width="20" height="3" rx="1" fill="#aaaaaa"/>
  <!-- Body trapezoid -->
  <polygon points="2,25 18,25 14,4 6,4"
           fill="none" stroke="#aaaaaa" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Top peak -->
  <polygon points="10,1 7,4 13,4" fill="#aaaaaa"/>
  <!-- Pendulum rod: pivots near base, swings up and right (/) -->
  <line x1="10" y1="22" x2="15" y2="3"
        stroke="#aaaaaa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Weight (slider on upper portion of rod) -->
  <rect x="11" y="12" width="5" height="3" rx="0.5" fill="#aaaaaa"/>
</svg>
