<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 26">
  <!-- Base foot -->
  <rect x="0" y="23" width="18" height="3" rx="1" fill="#aaaaaa"/>
  <!-- Body trapezoid -->
  <polygon points="2,23 16,23 12,4 6,4"
           fill="none" stroke="#aaaaaa" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Top peak -->
  <polygon points="9,1 6,4 12,4" fill="#aaaaaa"/>
  <!-- Pendulum rod (angled right ~17°) -->
  <line x1="9" y1="2" x2="14" y2="21"
        stroke="#aaaaaa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Weight (slider on pendulum) -->
  <rect x="10" y="9.5" width="5" height="3" rx="0.5" fill="#aaaaaa"/>
</svg>
